    <!-- Narrative on top -->

    <div class="transformer-grid">
        <!-- LEFT: Paper Screenshot -->
        <div class="transformer-col-paper">

            </div>

        <!-- RIGHT: Author + attention viz -->
        <div class="transformer-col-media">
            <div class="transformer-media-card">
                <div class="author-row">
                    <div class="author-portrait"><img src="assets/2017/Ashish Vaswani.jpeg" alt="Ashish Vaswani"></div>
                    <div class="author-info">
                        <div class="author-name">Ashish Vaswani</div>
                        <div class="author-role">Lead author — Google Brain, 2017</div>
                    </div>
                </div>

                <!-- Attention visualizer -->
                <div class="attention-viz">
                    <div class="attention-viz-label">Self-Attention — live demo</div>
                    <div class="attention-tokens" id="attn-tokens"></div>
                    <div class="attn-legend">
                        <div class="attn-legend-item">
                            <div class="attn-dot" style="background:#1a1a1a"></div>Focus word
                        </div>
                        <div class="attn-legend-item">
                            <div class="attn-dot" style="background:#3b82f6"></div>High relevance
                        </div>
                        <div class="attn-legend-item">
                            <div class="attn-dot" style="background:#93c5fd"></div>Medium
                        </div>
                        <div class="attn-legend-item">
                            <div class="attn-dot" style="background:#e0e8ff"></div>Low
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const slideEl = document.currentScript.closest('.slide');
            const sentences = [
                {
                    tokens: ['The', 'patient', 'received', 'a', 'beta-blocker', 'because', 'of', 'his', 'tachycardia'],
                    cycles: [
                        { source: 4, high: [8], medium: [1, 2], low: [0, 3, 5, 6, 7] },
                        { source: 8, high: [4], medium: [1, 5], low: [0, 2, 3, 6, 7] },
                        { source: 7, high: [1], medium: [4, 8], low: [0, 2, 3, 5, 6] },
                    ]
                },
                {
                    tokens: ['SGLT2', 'inhibitors', 'reduce', 'HFrEF', 'mortality', 'independent', 'of', 'diabetes'],
                    cycles: [
                        { source: 0, high: [1], medium: [3, 4], low: [2, 5, 6, 7] },
                        { source: 4, high: [3], medium: [0, 1], low: [2, 5, 6, 7] },
                        { source: 7, high: [5], medium: [4], low: [0, 1, 2, 3, 6] },
                    ]
                }
            ];

            let sentIdx = 0, cycleIdx = 0, intervalId = null;

            function applyAttention() {
                const container = document.getElementById('attn-tokens');
                if (!container) return;

                const s = sentences[sentIdx];
                const c = s.cycles[cycleIdx];

                container.innerHTML = '';
                s.tokens.forEach((tok, i) => {
                    const span = document.createElement('span');
                    span.className = 'attn-token';
                    span.textContent = tok;
                    if (i === c.source) span.classList.add('attn-source');
                    else if (c.high.includes(i)) span.classList.add('attn-high');
                    else if (c.medium.includes(i)) span.classList.add('attn-medium');
                    else span.classList.add('attn-low');
                    container.appendChild(span);
                });
            }

            function tick() {
                const s = sentences[sentIdx];
                cycleIdx = (cycleIdx + 1) % s.cycles.length;
                if (cycleIdx === 0) sentIdx = (sentIdx + 1) % sentences.length;
                applyAttention();
            }

            function startViz() {
                if (intervalId) return;
                applyAttention();
                intervalId = setInterval(tick, 2200);
            }

            function stopViz() {
                if (intervalId) { clearInterval(intervalId); intervalId = null; }
            }

            // Automatically play/pause based on slide visibility
            new MutationObserver(() => {
                slideEl.classList.contains('active') ? startViz() : stopViz();
            }).observe(slideEl, { attributes: true, attributeFilter: ['class'] });

        })();
    </script>
</div>
