      padding-top: 0;
    }

    .thank-you-slide h2 {
      font-family: var(--font-serif);
      font-size: clamp(1.2rem, 2.8vw, 2.2rem);
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 4.5rem;
      letter-spacing: -0.5px;
    }

    .contact-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid rgba(0, 0, 0, 0.08);

      max-width: 700px;
      margin-left: auto;
      margin-right: auto;

      transform: scale(1.08);

    .bg-light-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);

      bottom: -15%;
      left: -15%;
      animation: drift 30s infinite alternate-reverse ease-in-out;
    }
